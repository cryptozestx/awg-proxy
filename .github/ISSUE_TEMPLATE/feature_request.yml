name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please fill in the details below.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: Is your feature request related to a problem? Describe it clearly.
      placeholder: "I'm frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see added or changed.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, links, or screenshots.

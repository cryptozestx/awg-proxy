[Interface]
# The private key of your local interface (Base64 encoded)
PrivateKey = aaaaaa/aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa=

# The local IP address assigned to you by the VPN server
Address = 10.8.0.2/24

# DNS servers to use inside the userspace network stack
DNS = 1.1.1.1, 8.8.8.8

# MTU (Maximum Transmission Unit), defaults to 1420 if omitted
MTU = 1420

# --- AmneziaWG Obfuscation Parameters ---
# Jc: Junk packet count (decoy packets sent before each handshake)
Jc = 4
# Jmin: Minimum size of junk packets in bytes
Jmin = 40
# Jmax: Maximum size of junk packets in bytes
Jmax = 70
# S1: Handshake initiation packet padding size in bytes
S1 = 50
# S2: Handshake response packet padding size in bytes
S2 = 60
# H1: Handshake initiation packet type identifier override (32-bit uint)
H1 = 12345678
# H2: Handshake response packet type identifier override (32-bit uint)
H2 = 23456789
# H3: Cookie response packet type identifier override (32-bit uint)
H3 = 34567890
# H4: Transport data packet type identifier override (32-bit uint)
H4 = 45678901


[Peer]
# The public key of the remote VPN server (Base64 encoded)
PublicKey = bbbbbb/bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb=

# The host and port of the remote VPN server endpoint
Endpoint = 192.0.2.1:51820

# Subnets allowed to be routed over the VPN. 0.0.0.0/0 routes everything
AllowedIPs = 0.0.0.0/0

# Optional preshared key for an additional layer of symmetric cryptography
# PresharedKey = cccccc/ccccccccccccccccccccccccccccccccccc=

# Keep-alive interval in seconds to keep the NAT connection alive
PersistentKeepalive = 25
